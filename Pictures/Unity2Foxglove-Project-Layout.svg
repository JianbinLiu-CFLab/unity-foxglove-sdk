<svg width="980" height="520" viewBox="0 0 980 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Unity2Foxglove project layout</title>
  <desc id="desc">The repository contains the reusable Unity package, the demo Unity project, scripts for IL2CPP builds, and package samples.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1e3a5f"/>
    </marker>
  </defs>

  <rect width="980" height="520" rx="28" fill="#f8fafc"/>
  <text x="490" y="52" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#1e40af">Project layout</text>
  <text x="490" y="84" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#64748b">One repository, two user entry points, and one helper script folder.</text>

  <rect x="360" y="118" width="260" height="82" rx="20" fill="#dbeafe" stroke="#1e3a5f" stroke-width="3"/>
  <text x="490" y="152" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e3a5f">Unity2Foxglove</text>
  <text x="490" y="177" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#374151">repository root</text>

  <rect x="64" y="292" width="248" height="92" rx="18" fill="#a7f3d0" stroke="#047857" stroke-width="3"/>
  <text x="188" y="326" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#047857">Package</text>
  <text x="188" y="351" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#374151">Packages/dev.unity2foxglove.sdk</text>
  <text x="188" y="371" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#374151">install into your own project</text>

  <rect x="366" y="292" width="248" height="92" rx="18" fill="#fed7aa" stroke="#c2410c" stroke-width="3"/>
  <text x="490" y="326" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#c2410c">Demo project</text>
  <text x="490" y="351" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#374151">Untiy2Foxglove</text>
  <text x="490" y="371" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#374151">open, test, record, replay</text>

  <rect x="668" y="292" width="248" height="92" rx="18" fill="#ddd6fe" stroke="#6d28d9" stroke-width="3"/>
  <text x="792" y="326" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#6d28d9">Scripts</text>
  <text x="792" y="351" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#374151">Scripts/build_unity_il2cpp.py</text>
  <text x="792" y="371" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#374151">build the demo project fast</text>

  <rect x="96" y="424" width="184" height="58" rx="16" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
  <text x="188" y="448" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#047857">Samples~</text>
  <text x="188" y="468" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#374151">Basic + Full Demo</text>

  <path d="M430 201 C370 238 280 254 208 286" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M490 201 V280" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M550 201 C610 238 700 254 772 286" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M188 386 V412" stroke="#047857" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
