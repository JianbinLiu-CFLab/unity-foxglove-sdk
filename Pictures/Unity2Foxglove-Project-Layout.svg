  <rect x="564" y="418" width="300" height="44" rx="22" fill="#f5f3ff" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="714" y="446" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#6d28d9">Scripts build Untiy2Foxglove into build/Unity</text>
