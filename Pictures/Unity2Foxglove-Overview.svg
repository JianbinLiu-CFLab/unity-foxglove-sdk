<svg width="920" height="460" viewBox="0 0 920 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Unity2Foxglove overview</title>
  <desc id="desc">Unity communicates live with Foxglove over WebSocket, records and replays MCAP files, and Foxglove can open MCAP files offline.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#1e3a5f"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#047857"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#c2410c"/>
    </marker>
  </defs>

  <rect width="920" height="460" rx="28" fill="#f8fafc"/>
  <text x="460" y="54" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#1e40af">Unity2Foxglove in one picture</text>
  <text x="460" y="86" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#64748b">Live visualization, offline recording, and replay without a ROS bridge or external Unity process.</text>

  <rect x="350" y="126" width="220" height="92" rx="20" fill="#dbeafe" stroke="#1e3a5f" stroke-width="3"/>
  <text x="460" y="163" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a5f">Unity</text>
  <text x="460" y="190" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#374151">Editor or Player</text>

  <rect x="112" y="310" width="220" height="92" rx="20" fill="#a7f3d0" stroke="#047857" stroke-width="3"/>
  <text x="222" y="347" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#047857">MCAP</text>
  <text x="222" y="374" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#374151">recording file</text>

  <rect x="588" y="310" width="220" height="92" rx="20" fill="#fed7aa" stroke="#c2410c" stroke-width="3"/>
  <text x="698" y="347" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#c2410c">Foxglove</text>
  <text x="698" y="374" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#374151">live or offline view</text>

  <path d="M555 181 C650 184 690 220 696 298" stroke="#c2410c" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-orange)"/>
  <path d="M683 300 C676 228 635 201 565 195" stroke="#c2410c" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-orange)"/>
  <rect x="612" y="214" width="172" height="38" rx="19" fill="#fff7ed" stroke="#c2410c" stroke-width="1.5"/>
  <text x="698" y="238" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#9a3412">live WebSocket</text>

  <path d="M365 198 C288 224 238 257 226 298" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <path d="M238 304 C256 263 307 236 375 213" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
  <rect x="148" y="228" width="154" height="38" rx="19" fill="#eff6ff" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="225" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#1e3a5f">record / replay</text>

  <path d="M336 356 H574" stroke="#047857" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-green)"/>
  <rect x="365" y="314" width="190" height="38" rx="19" fill="#ecfdf5" stroke="#047857" stroke-width="1.5"/>
  <text x="460" y="338" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#047857">open and inspect</text>

  <text x="460" y="430" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#64748b">Unity is the runtime source. MCAP is the portable file. Foxglove is the live and offline visualization client.</text>
</svg>
