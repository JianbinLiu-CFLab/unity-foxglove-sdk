name: package structure check

on:
  push:
    branches: [main]
    paths-ignore:
      - "Plan/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "Plan/**"
      - "**.md"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate release package
        run: python3 Scripts/release/validate_package.py

      - name: Validate ROS2 For Unity runtime package
        run: python3 Scripts/release/validate_r2fu_runtime_package.py

      - name: Validate ROS2 For Unity adapter package
        run: python3 Scripts/release/validate_ros2forunity_package.py
