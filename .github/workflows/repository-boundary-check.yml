name: repository boundary check

on:
  push:
    branches: [main]
    paths:
      - "Plan/**"
      - "Developer/**"
      - "*/Developer/**"
      - "*/Developer.meta"
      - ".github/workflows/repository-boundary-check.yml"
  pull_request:
    branches: [main]
    paths:
      - "Plan/**"
      - "Developer/**"
      - "*/Developer/**"
      - "*/Developer.meta"
      - ".github/workflows/repository-boundary-check.yml"

jobs:
  private-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block tracked private workspace files
        run: |
          root_private="$(git ls-files -- 'Plan/**' 'Developer/**')"
          if [ -n "$root_private" ]; then
            echo "::error::Plan/ and Developer/ are local-only private workspace material and must not be tracked."
            printf '%s\n' "$root_private"
            exit 1
          fi

          nested_developer="$(git ls-files -- ':(glob)**/Developer/**' ':(glob)**/Developer.meta')"
          if [ -n "$nested_developer" ]; then
            echo "::error::Tracked demo or experimental assets must use Experimental/, not Developer/."
            printf '%s\n' "$nested_developer"
            exit 1
          fi
